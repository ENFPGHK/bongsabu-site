<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이용 안내</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to bottom, #dff4ff, #c9eaff);
    font-family: "Malgun Gothic", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.letter {
    width: 85%;
    max-width: 700px;
    background: #fffdf8;
    border: 8px solid #87ceeb;
    border-radius: 30px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

h1 {
    text-align: center;
    color: #4a90e2;
    font-size: 40px;
    margin-bottom: 30px;
}

p {
    font-size: 20px;
    line-height: 1.8;
    color: #444;
}

.button-box {
    text-align: center;
    margin-top: 40px;
}

button {
    background: #87ceeb;
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 20px;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #5fb9e8;
}
</style>

</head>

<body>

<div class="letter">

<h1>💌 이용 안내</h1>

<p>
이 웹사이트는 대청소를 하지 않은 친구를 제보하면,
저희가 다음 대청소 때 예의주시하여 확인한 후
X표 3개를 부여할 예정입니다.
</p>

<p>
또한 친구와 갈등이 생겼지만
사과하거나 화해할 용기가 나지 않을 경우,
의견을 남겨 주시면 저희가 잘 해결해 보겠습니다.
</p>

<p>
그래도 열심히 만들어 놓은 사이트니까
이상한 짓은 하지 말아 주세요! 😭
</p>

<p>
웬만한 건 다 봐드릴 테니,
서버에 문제가 생길 만한 행동만 하지 말아 주세요. 🙏
</p>

<div class="button-box">
    <button onclick="location.href='form.html'">
        이해했어요 💌
    </button>
</div>

</div>

</body>
</html>
