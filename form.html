<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건의하기</title>

<style>
body {
    margin: 0;
    font-family: "Malgun Gothic", sans-serif;
    background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200");
    background-size: cover;
    background-position: center;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.overlay {
    background: rgba(255,255,255,0.85);
    padding: 40px;
    border-radius: 30px;
    width: 80%;
    max-width: 600px;
    text-align: center;
}

h1 {
    color: #3a6ea5;
    margin-bottom: 10px;
}

p {
    color: #666;
    margin-bottom: 30px;
}

input, textarea {
    width: 90%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 15px;
    font-size: 16px;
}

textarea {
    height: 180px;
    resize: none;
}

button {
    margin-top: 20px;
    padding: 15px 40px;
    border: none;
    border-radius: 30px;
    background: #5da9e9;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

button:hover {
    background: #3a8ad3;
}
</style>

</head>

<body>

<div class="overlay">

<h1>이름을 적어주세요</h1>

<p>익명성 보장 100퍼센트</p>

<input type="text" placeholder="이름을 입력하세요">

<br>

<textarea placeholder="의견을 적어주세요"></textarea>

<br>

<button onclick="location.href='thanks.html'">
제출하기
</button>

</div>

</body>
</html>
